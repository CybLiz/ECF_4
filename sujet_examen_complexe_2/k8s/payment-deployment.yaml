apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
  namespace: ecommerce-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9050
          envFrom:
            - configMapRef:
                name: payment-configmap
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"